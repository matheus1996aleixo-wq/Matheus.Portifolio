<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-bold text-white">Painel Administrativo do Portfólio</h1>
            <div class="space-x-4">
                <a href="/" target="_blank" class="text-cyan-400 hover:underline">Ver Site</a>
                <a href="/logout" class="bg-red-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-700">Sair</a>
            </div>
        </div>

        <!-- Formulário de Atualização do Profile -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl mb-8">
            <h2 class="text-lg font-bold text-white mb-4">Atualizar Informações do Profile</h2>
            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" name="action" value="update_profile">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Full Name</label>
                    <input type="text" name="full_name" value="{{ data.profile.full_name }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Date of Birth</label>
                    <input type="text" name="date_of_brith" value="{{ data.profile.date_of_brith }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">City</label>
                    <input type="text" name="city" value="{{ data.profile.city }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">State</label>
                    <input type="text" name="state" value="{{ data.profile.state }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Country</label>
                    <input type="text" name="country" value="{{ data.profile.country }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Graduation</label>
                    <input type="text" name="graduation" value="{{ data.profile.graduation }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Course</label>
                    <input type="text" name="course" value="{{ data.profile.course }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">University</label>
                    <input type="text" name="university" value="{{ data.profile.university }}" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white">
                </div>
                <div class="md:col-span-2 mt-4">
                    <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold px-6 py-2.5 rounded-xl transition w-full">Salvar e Sincronizar com GitHub</button>
                </div>
            </form>
        </div>

        <!-- Adicionar / Remover Projetos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Adicionar Projeto -->
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-white mb-4">Adicionar Novo Projeto</h2>
                <form method="POST" class="space-y-4">
                    <input type="hidden" name="action" value="add_project">
                    <input type="text" name="title" placeholder="Título do Projeto" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white text-sm">
                    <input type="text" name="description" placeholder="Breve Descrição" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white text-sm">
                    <input type="text" name="tech" placeholder="Tecnologias (separadas por vírgula)" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white text-sm">
                    <input type="text" name="link_live" placeholder="Link da Aplicação (View Live)" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white text-sm">
                    <input type="text" name="link_github" placeholder="Link do GitHub" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white text-sm">
                    <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold py-2.5 rounded-xl transition">Adicionar Projeto</button>
                </form>
            </div>

            <!-- Excluir Projetos -->
            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl">
                <h2 class="text-lg font-bold text-white mb-4">Gerenciar / Excluir Projetos</h2>
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    {% for project in data.projects %}
                    <form method="POST" class="flex justify-between items-center bg-gray-800 p-3 rounded-xl border border-gray-700">
                        <input type="hidden" name="action" value="delete_project">
                        <input type="hidden" name="project_id" value="{{ project.id }}">
                        <span class="text-sm font-medium text-white truncate max-w-[200px]">{{ project.title }}</span>
                        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white text-xs px-3 py-1.5 rounded-lg transition">Excluir</button>
                    </form>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
