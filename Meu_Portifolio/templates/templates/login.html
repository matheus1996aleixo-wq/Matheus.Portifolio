<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Portfólio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 flex items-center justify-center h-screen">
    <div class="card-glass bg-gray-900 border border-gray-800 p-8 rounded-3xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white">Painel Administrativo</h1>
            <p class="text-sm text-gray-400 mt-1">Faça login para gerenciar seu portfólio</p>
        </div>

        {% if erro %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-xs p-3 rounded-xl mb-6 text-center">
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Usuário</label>
                <input type="text" name="username" required class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-white text-sm focus:border-cyan-400 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Senha</label>
                <input type="password" name="password" required class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-white text-sm focus:border-cyan-400 focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold py-3 rounded-xl transition text-sm mt-2">Entrar</button>
        </form>
        <div class="text-center mt-6">
            <a href="/" class="text-xs text-cyan-400 hover:underline">Voltar para o site</a>
        </div>
    </div>
</body>
</html>
